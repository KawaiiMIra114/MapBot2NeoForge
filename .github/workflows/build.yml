name: Java Build Check

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - MapBot_Reforged
          - Mapbot-Alpha-V1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        run: chmod +x gradlew
        working-directory: ${{ matrix.project }}

      - name: Normalize Gradle wrapper EOL
        run: sed -i 's/\r$//' gradlew
        working-directory: ${{ matrix.project }}

      - name: Build
        run: ./gradlew --no-daemon clean build
        working-directory: ${{ matrix.project }}
