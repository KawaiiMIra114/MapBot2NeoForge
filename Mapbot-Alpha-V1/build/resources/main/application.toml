# Mapbot Alpha 配置
[server]
# Alpha 监听端口 (用于分流 MC 和 Web 控制台)
listenPort = 25560
# 目标 Minecraft 服务器端口 (Alpha 将流量转发至此)
targetMcPort = 25565
# MC 服务器运行目录
mcPath = "./MapBot_Reforged/run"
# MC 启动命令
mcStartCommand = "java -Xmx2G -jar ../build/libs/mapbot-5.0.0-REF.jar nogui"

[bot]
# OneBot WebSocket 地址
websocketUrl = "ws://127.0.0.1:8080"
# 管理员 QQ
adminQQ = 12345678

[auth]
# 远程控制台访问密钥
consoleToken = "change_me_now"
