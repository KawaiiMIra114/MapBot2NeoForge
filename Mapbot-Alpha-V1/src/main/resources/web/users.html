<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MapBot Alpha | 用户数据管理</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, "Microsoft YaHei", sans-serif; margin: 24px; background:#0f1410; color:#eef3e7; }
    a { color:#a7f042; }
    .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    input, button { padding:10px 12px; border-radius:10px; border:1px solid rgba(255,255,255,.12); background:#1b2312; color:#eef3e7; }
    button { cursor:pointer; background:#2a3320; }
    button.primary { background:#a7f042; color:#0f1410; border-color:#a7f042; font-weight:700; }
    .card { margin-top:16px; padding:16px; border-radius:16px; border:1px solid rgba(255,255,255,.08); background:#141b12; }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; padding:10px 8px; border-bottom:1px solid rgba(255,255,255,.08); font-size:14px; }
    th { color:#b7c8a7; font-weight:700; }
    .muted { color:#b7c8a7; }
    .pill { display:inline-block; padding:2px 8px; border-radius:999px; background:rgba(167,240,66,.14); color:#a7f042; font-size:12px; }
    .danger { background:rgba(255,90,90,.18); color:#ff9a9a; border-color:rgba(255,90,90,.3); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .small { font-size:12px; }
    .actions { display:flex; gap:8px; align-items:center; }
  </style>
</head>
<body>
  <h1 style="margin:0 0 6px;">用户数据管理</h1>
  <div class="muted small">
    需要使用 Web 控制台登录获取的 Token（Authorization: Bearer ...）。此页面仅提供基础 CRUD，避免误操作请谨慎。
  </div>

  <div class="card">
    <div class="row">
      <label class="mono small">Token</label>
      <input id="token" style="min-width:420px; flex:1" placeholder="粘贴 Bearer Token（不含 Bearer 前缀）" />
      <button class="primary" onclick="reloadAll()">刷新数据</button>
      <span id="status" class="small muted"></span>
    </div>
    <div class="small muted" style="margin-top:8px;">
      快捷入口：<a href="/" target="_blank">主面板</a>
    </div>
  </div>

  <div class="card">
    <div class="row" style="justify-content:space-between;">
      <h2 style="margin:0;">Admins</h2>
      <div class="row">
        <input id="adminQq" class="mono" placeholder="QQ号" />
        <button onclick="adminAdd()">添加</button>
        <button class="danger" onclick="adminRemove()">移除</button>
      </div>
    </div>
    <div id="admins" class="small muted" style="margin-top:10px;"></div>
  </div>

  <div class="card">
    <div class="row" style="justify-content:space-between;">
      <h2 style="margin:0;">Bindings</h2>
      <div class="row">
        <input id="unbindQq" class="mono" placeholder="QQ号" />
        <button class="danger" onclick="unbind()">解绑</button>
      </div>
    </div>
    <table style="margin-top:10px;">
      <thead><tr><th>QQ</th><th>UUID</th></tr></thead>
      <tbody id="bindings"></tbody>
    </table>
  </div>

  <div class="card">
    <div class="row" style="justify-content:space-between;">
      <h2 style="margin:0;">Permissions</h2>
      <div class="row">
        <input id="permQq" class="mono" placeholder="QQ号" />
        <input id="permLevel" class="mono" placeholder="Level(0/1/2)" />
        <button onclick="setPerm()">设置</button>
      </div>
    </div>
    <table style="margin-top:10px;">
      <thead><tr><th>QQ</th><th>Level</th></tr></thead>
      <tbody id="permissions"></tbody>
    </table>
  </div>

  <div class="card">
    <div class="row" style="justify-content:space-between;">
      <h2 style="margin:0;">Mutes</h2>
      <div class="row">
        <input id="muteUuid" class="mono" placeholder="UUID" style="min-width:260px;" />
        <input id="muteExpiry" class="mono" placeholder="expiryMs(-1永久 / 时间戳)" style="min-width:220px;" />
        <button onclick="mute()">禁言</button>
        <button class="danger" onclick="unmute()">解禁</button>
      </div>
    </div>
    <table style="margin-top:10px;">
      <thead><tr><th>UUID</th><th>Expiry</th></tr></thead>
      <tbody id="mutes"></tbody>
    </table>
  </div>

  <script>
    function getToken() {
      return document.getElementById('token').value.trim();
    }

    async function api(path, options = {}) {
      const token = getToken();
      const headers = options.headers || {};
      headers['Authorization'] = 'Bearer ' + token;
      if (!headers['Content-Type'] && options.method && options.method !== 'GET') {
        headers['Content-Type'] = 'application/json';
      }
      const res = await fetch(path, { ...options, headers });
      const text = await res.text();
      try { return JSON.parse(text); } catch { return { error: text || ('HTTP ' + res.status) }; }
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function renderList(list) {
      if (!list || list.length === 0) return '<span class="muted">(空)</span>';
      return list.map(x => '<span class="pill mono" style="margin-right:8px;">' + x + '</span>').join('');
    }

    function kvRows(obj, keyLabel, valLabel) {
      const entries = Object.entries(obj || {});
      entries.sort((a, b) => String(a[0]).localeCompare(String(b[0])));
      return entries.map(([k, v]) => `<tr><td class="mono">${k}</td><td class="mono">${v}</td></tr>`).join('') || `<tr><td class="muted" colspan="2">(空)</td></tr>`;
    }

    async function reloadAll() {
      setStatus('加载中...');
      const data = await api('/api/mapbot/data');
      if (data.error) {
        setStatus('错误: ' + data.error);
        return;
      }
      document.getElementById('admins').innerHTML = renderList(data.admins || []);
      document.getElementById('bindings').innerHTML = kvRows(data.bindings, 'QQ', 'UUID');
      document.getElementById('permissions').innerHTML = kvRows(data.permissions, 'QQ', 'Level');
      document.getElementById('mutes').innerHTML = kvRows(data.mutes, 'UUID', 'Expiry');
      setStatus('已刷新: ' + new Date().toLocaleString());
    }

    async function setPerm() {
      const qq = document.getElementById('permQq').value.trim();
      const level = document.getElementById('permLevel').value.trim();
      if (!qq || !level) return setStatus('请填写 QQ 与 Level');
      const r = await api('/api/mapbot/permission', { method:'POST', body: JSON.stringify({ qq, level }) });
      if (r.error) return setStatus('错误: ' + r.error);
      await reloadAll();
    }

    async function unbind() {
      const qq = document.getElementById('unbindQq').value.trim();
      if (!qq) return setStatus('请填写 QQ');
      const r = await api('/api/mapbot/unbind', { method:'POST', body: JSON.stringify({ qq }) });
      if (r.error) return setStatus('错误: ' + r.error);
      await reloadAll();
    }

    async function adminAdd() {
      const qq = document.getElementById('adminQq').value.trim();
      if (!qq) return setStatus('请填写 QQ');
      const r = await api('/api/mapbot/admin/add', { method:'POST', body: JSON.stringify({ qq }) });
      if (r.error) return setStatus('错误: ' + r.error);
      await reloadAll();
    }

    async function adminRemove() {
      const qq = document.getElementById('adminQq').value.trim();
      if (!qq) return setStatus('请填写 QQ');
      const r = await api('/api/mapbot/admin/remove', { method:'POST', body: JSON.stringify({ qq }) });
      if (r.error) return setStatus('错误: ' + r.error);
      await reloadAll();
    }

    async function mute() {
      const uuid = document.getElementById('muteUuid').value.trim();
      const expiryMs = document.getElementById('muteExpiry').value.trim();
      if (!uuid) return setStatus('请填写 UUID');
      const payload = { uuid };
      if (expiryMs) payload.expiryMs = expiryMs;
      const r = await api('/api/mapbot/mute', { method:'POST', body: JSON.stringify(payload) });
      if (r.error) return setStatus('错误: ' + r.error);
      await reloadAll();
    }

    async function unmute() {
      const uuid = document.getElementById('muteUuid').value.trim();
      if (!uuid) return setStatus('请填写 UUID');
      const r = await api('/api/mapbot/unmute', { method:'POST', body: JSON.stringify({ uuid }) });
      if (r.error) return setStatus('错误: ' + r.error);
      await reloadAll();
    }
  </script>
</body>
</html>
