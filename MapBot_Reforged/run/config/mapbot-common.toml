#MapBot Reforged 配置文件
#此文件由 NeoForge 自动管理，修改后无需重启服务器
[connection]
	#NapCat WebSocket 服务器地址
	#默认为本地地址，如 NapCat 在远程服务器请修改
	wsUrl = "ws://127.0.0.1:7000"
	#断线重连间隔 (秒)
	#连接失败后等待多少秒再次尝试
	#Range: 1 ~ 60
	reconnectInterval = 5

[messaging]
	#玩家群号
	#普通消息将从此群转发到游戏
	#设置为 0 将禁用消息转发功能
	#Range: 0 ~ 9223372036854775807
	playerGroupId = 875585697
	#管理群号
	#敏感命令 (#inv, #stopserver 等) 仅限此群使用
	#设置为 0 将禁用管理群功能 (不推荐)
	#Range: 0 ~ 9223372036854775807
	adminGroupId = 885810515
	#机器人 QQ 号
	#用于识别机器人转发的消息，实现回复通知功能
	#Range: 0 ~ 9223372036854775807
	botQQ = 2133782376

[debug]
	#调试模式
	#启用后将记录所有原始 WebSocket 数据包
	debugMode = true

[alpha]
	#服务器 ID
	#在 Alpha Core 中标识此服务器的唯一名称
	serverId = "survival"
	#Alpha Core 主机地址
	#设置为空字符串将禁用 Bridge 功能
	alphaHost = "127.0.0.1"
	#Alpha Core Bridge 端口
	#除智能分流口 25560 外，请避开 25560-25566 保留端口段
	#默认使用 25661
	#Range: 1 ~ 65535
	alphaPort = 25561
	#Alpha Core Bridge 鉴权令牌
	#需与 Alpha 端 auth.bridge.token 配置一致
	alphaToken = "BotbmlIJnrwR-bejxo2G75NgxZquT2ex"
	#本服对外可转移地址（用于跨服 /transfer）
	#填写玩家客户端可访问到的主机名/IP，例如 mc.example.com
	#留空表示不参与跨服转移地址上报
	transferHost = ""
	#本服对外可转移端口（用于跨服 /transfer）
	#Range: 1 ~ 65535
	transferPort = 25565
