#MapBot Reforged 配置文件
#此文件由 NeoForge 自动管理，修改后无需重启服务器
[connection]
	#NapCat WebSocket 服务器地址
	#默认为本地地址，如 NapCat 在远程服务器请修改
	wsUrl = "ws://127.0.0.1:7000" 
	#断线重连间隔 (秒)
	#连接失败后等待多少秒再次尝试
	#Range: 1 ~ 60
	reconnectInterval = 5

[messaging]
	#目标 QQ 群号
	#设置为 0 将禁用消息同步功能
	#只有来自此群的消息会被转发到游戏
	#Range: 0 ~ 9223372036854775807
	targetGroupId = 875585697

[debug]
	#调试模式
	#启用后将记录所有原始 WebSocket 数据包
	debugMode = false
